name: Publish React SDK to npm

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  publish:
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'v-react-sdk-') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck React SDK
        run: pnpm --filter @fire-signal/react-sdk run typecheck

      - name: Test React SDK
        run: pnpm --filter @fire-signal/react-sdk run test:run

      - name: Build React SDK
        run: pnpm --filter @fire-signal/react-sdk run build

      - name: Publish React SDK to npm
        run: npm publish --provenance --access public
        working-directory: packages/react-sdk
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
